    message:
      type: string
      description: Mensagem de retorno da operação.
      readOnly: true
      examples:
        - Operation Successful
    payer:
      type: object
      description: É a parte pagadora do checkout. Aquele para quem o checkout se
        destina. Este nó é o nó raiz, que agrupa os dados do cliente pagador.
        Todos os elementos do pagador funcionam de maneira opcional na API, mas
        obrigatória para a transação. Isso significa que, se não forem enviados
        na chamada à API, serão solicitados ao pagador no momento da transação.
        Caso sejam enviados, o pagador não poderá editá-los.
      properties:
        name:
          type: string
          maxLength: 40
          pattern: ^(?!\s*$).+
          description: É o nome (no caso de PF) ou a Razão Social (no caso de PJ).
          examples:
            - José da Silva
        tax_id:
          type: string
          minLength: 11
          maxLength: 14
          description: É o documento fiscal (CPF em caso de PF e CNPJ em caso de PJ/MEI)
            do cliente pagador (sacado). Deve ser enviado sem máscara,
            respeitando os zeros à esquerda.
          examples:
            - "12345678910"
        email:
          type: string
          format: email
          maxLength: 200
          pattern: ^[a-z0-9.!#$&amp'*+\/=?^_`{|}~-]+@[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?(?:\.[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?)*$
          description: Endereço de email do cliente pagador.
          examples:
            - pagador@email.com.br
        phone_number:
          type: string
          description: É o número de telefone do pagador.
          examples:
            - "11999999999"
        address:
          $ref: "#/components/schemas/address"
    payment:
      type: object
      properties:
        card:
          $ref: "#/components/schemas/card"
        pix:
          $ref: "#/components/schemas/pix"
    payment_date_time:
      type: string
      format: date-time
      readOnly: true
      description: Data e hora em que o checkout foi pago.
      examples:
