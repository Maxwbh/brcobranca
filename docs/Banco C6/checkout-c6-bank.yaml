    token:
      type: string
      description: Token do cartão. Retornado em operações onde o checkout é comandado
        a armazenar o cartão (save_card = true). Este token deve ser enviado
        caso uma nova cobrança deva ser executada para este mesmo cartão. Caso
        enviado, uma tentativa de pagamento do checkout é automaticamente
        realizada com este cartão.
    url:
      type: string
      readOnly: true
      description: É a URL do checkout em si. Aquela à qual o pagador deve ser
        encaminhado para uso do checkout. Pode ser ignorado caso você faça uso
        do checkout transparente.
      examples:
        - https://checkout.c6bank.info/01J3NCKY6Q99QC4D7T733D35QD
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
