            caracteres deste campo e do campo "number" somados não pode
            ultrapassar 40 posições.
          examples:
            - Av. Nove de Julho
        number:
          type: number
          description: Número da rua do endereço do cliente pagador. A quantidade total de
            caracteres deste campo e do campo "street" somados não pode
            ultrapassar 40 posições.
          examples:
            - 123
        complement:
          type: string
          maxLength: 24
          description: Complemento do endereço do cliente pagador.
          examples:
            - Complemento
        city:
          type: string
          maxLength: 40
          description: Cidade do endereço do cliente pagador.
          examples:
            - Rio de Janeiro
        state:
          type: string
          maxLength: 2
