openapi: 3.1.1
info:
  title: Notificações
  version: 1.0.8
  description: >-
    ## O que esta API permite?

    A API de notificações ou também chamada de Webhook, permite que você receba
    notificações sempre que o status de um objeto criado por você for
    modificado. As notificações são enviadas via chamadas HTTP para uma URL
    configurada por você e são iniciadas do nosso lado.


    ## Formato das notificações

    Você pode conferir o formato das notificações enviadas nas áreas de
    'Notificações de Boleto' e 'Notificações de Checkout' nesta mesma
    documentação. Dentro dessas áreas você pode identificar quais serão os
    possíveis retornos que você receberá.


    Caso deseje utilizar o webhook para notificar o produto de PIX, é necessário
    que as solicitações sejam feitas por meio da documentação de PIX, já que o
    fluxo não o mesmo como nas outras APIs. Visite a documentação <a
    href="https://developers.c6bank.com.br/apis/pix">clicando aqui</a>


    <br>


    ________________


    ## **Resumo Técnico da API**


    Tabela com os tipos de notificações por produto:


    A tabela abaixo descreve os status a serem retornados baseado em qual
    produto ele pertence e em qual evento ele vai fazer a notificação.


    | Produto     | Service      | Evento                    | Status          |

    |:-----------:|:------------:|:--------------------------|:---------------:|

    | **Boleto**  | BANK_SLIP    | Criado                    | CREATED         |

    |             |              | Alterado                  | CREATED         |

    |             |              | Cancelado (em breve)      | CANCELLED       |

    |             |              | Pago                      | PAID            |

    | **Bolepix**     |BANK_SLIP_PIX | Criado                    |CREATED      |

    |             |              | Pago                      |PAID             |

    ||||

    | **Checkout**| CHECKOUT   | Criado                    | CREATED         |

    |             |            | Expirado                  | EXPIRED         |

    |             |            | Autorizado (em breve)     | AUTHORIZED      |

    |             |            | Negado                    | DECLINED        |

    |             |            | Falha (em breve)          | ERROR           |

    |             |            | Cancelado (em breve)      | CANCELLED       |

    |             |            | Pago                      | PAID            |

    ||||

    | **PIX**     | N/A        | Pago                      | PAID            |

    ||||

    | **PIX Automático** | N/A | Criado                      |
    CRIADA            |

    | | N/A | Aprovado                    | APROVADA          |

    | | N/A | Cancelado                   | CANCELADA         |


    Descrição detalhada de cada coluna da tabela acima:


    | Coluna      | Descrição  |

    |:-----------:|:----------:|

    | **Produto** | Representa a API que está sendo utilizada. É o produto para
    o qual o webhook foi cadastrado. Por exemplo, se o produto for “Boleto”,
    significa que o webhook está vinculado ao fluxo de boletos dessa API. |

    | **Service** | É o serviço para o qual o usuário deseja receber
    notificações. O usuário define isso no payload ao registrar um webhook,
    passando, por exemplo, 'BANK_SLIP' ou 'CHECKOUT'. Para o produto PIX, o
    processo deve ser validado em sua documentação. |

    | **Evento**  | Representa o momento no qual será disparado a notificação.
    Por exemplo: quando um link de pagamento expira, quando um boleto ou link de
    pagamento são pagos. É o “gatilho” que faz o webhook enviar a notificação. |

    | **Status**  | Indica o status que será retornado na notificação,
    permitindo a visualização e o entendimento de qual evento ocorreu. Por
    exemplo, quando um boleto ou link de pagamento são pagos, o status no
    response body será 'PAID'. Quando um link de pagamento expira, o status é
    'EXPIRED'. |


    Operações disponíveis para esta API:


    | Operações                                                          |

    |:------------------------------------------------------------------:|

    | [Registrar um webhook](./webhook#tag/api-de-webhook/post/)         |

    | [Consultar um webhook](./webhook#tag/api-de-webhook/get/)          |

    | [Excluir um webhook](./webhook#tag/api-de-webhook/delete/)         |


    Retornos de eventos notificados pela API:


    | Retornos de eventos da API de:                                    |

    |:-----------------------------------------------------------------:|

    | [Boleto](./webhook#tag/notificações-de-boleto/postboleto)         |

    | [Boleto](./webhook#tag/notificações-de-boleto/getbolepix)         |

    | [Checkout](./webhook#tag/notificações-de-checkout/getcheckout)    |

    | [PIX](./webhook#tag/notificações-de-pix/getpix)                   |

    | [PIX
    Automático](./webhook#tag/notificações-de-pix/getpix-automatico)        |


    Endereço dos ambientes:


    | Ambiente | Host                                 | Path          |

    |:--------:|------------------------------------- |---------------|

    | Sandbox  | https://baas-api-sandbox.c6bank.info | /v1/webhooks/ |

    | Produção | https://baas-api.c6bank.info         | /v1/webhooks/ |
servers:
  - url: https://baas-api-sandbox.c6bank.info/v1/webhooks
    description: Ambiente sandbox
  - url: https://baas-api.c6bank.info/v1/webhooks
    description: Ambiente produtivo
paths:
  /:
    parameters:
      - $ref: "#/components/parameters/PartnerSoftwareName"
      - $ref: "#/components/parameters/PartnerSoftwareVersion"
      - $ref: "#/components/parameters/Authorization"
    post:
      tags:
        - API de Webhook
      summary: Registrar um novo webhook para receber notificações
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookRequest"
      responses:
        "200":
          description: Webhook cadastrado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookResponse"
        4xx:
          description: Para descrição de erros visite a <a
            href="https://developers.c6bank.com.br/apis/errors">documentação
            correspondente</a>.
        5xx:
          description: Para descrição de erros visite a <a
            href="https://developers.c6bank.com.br/apis/errors">documentação
            correspondente</a>.
    get:
      tags:
        - API de Webhook
      summary: Consultar um webhook cadastrado
      parameters:
        - $ref: "#/components/parameters/Service"
        - $ref: "#/components/parameters/ContentType"
        - $ref: "#/components/parameters/Authorization"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookResponse"
        4xx:
          description: Para descrição de erros visite a <a
            href="https://developers.c6bank.com.br/apis/errors">documentação
            correspondente</a>.
        5xx:
          description: Para descrição de erros visite a <a
            href="https://developers.c6bank.com.br/apis/errors">documentação
            correspondente</a>.
    delete:
      tags:
        - API de Webhook
      summary: Excluir um webhook cadastrado
      parameters:
        - $ref: "#/components/parameters/Service"
        - $ref: "#/components/parameters/ContentType"
        - $ref: "#/components/parameters/Authorization"
      responses:
        "204":
          description: OK
        4xx:
          description: Para descrição de erros visite a <a
            href="https://developers.c6bank.com.br/apis/errors">documentação
            correspondente</a>.
        5xx:
          description: Para descrição de erros visite a <a
            href="https://developers.c6bank.com.br/apis/errors">documentação
            correspondente</a>.
  boleto:
    post:
      tags:
        - Notificações de Boleto
      summary: Notificações da API de Boleto
      description: >-
        Nesta área, apresentamos as possíveis notificações que você poderá
        receber ao cadastrar um webhook para uso com a API de Boleto.


        Caso tenha dúvidas no uso da API para as notificações de Boleto, visite
        a documentação: <b><a
        href="https://developers.c6bank.com.br/apis/bankslip">Boleto
        bancário</a></b>


        Notificações exemplificadas:

        - <b>Emissão: </b>

          Enviado quando houver a geração de um boleto.

          Status: CREATED

          Endpoint da API: /v1/bank_slips/

          <br>
          <hr>

        - <b>Alteração: </b>

          Enviado quando houver alteração de um boleto.

          Status: CREATED

          Endpoint da API: /v1/bank_slips/{id}

          <br>
          <hr>

        - <b>Pagamento: </b>

          Enviado quando o pagamento de um boleto é feito com sucesso.

          Status: PAID

          Pagamentos não são registrados manualmente (não são notificados após o uso de um endpoint). Eles são processados automaticamente pelo fluxo, que valida o status da transação e envia a notificação correspondente.
      responses:
        1. Emissão:
          description: Notificação enviada na geração de um boleto.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/WebhookNotification"
                  - type: object
                    properties:
                      service:
                        type: string
                        examples:
                          - BANK_SLIP
                      status:
                        type: string
                        description: Status da notificação
                        examples:
                          - CREATED
                      information:
                        type: string
                        description: É o objeto atualizado. Este objeto será diferente, conforme o
                          "service" utilizado.
                        examples:
                          - '{"id":"01KB0N9PQAQAABHPCXGKPA1GJA","bar_code":"33693131100000100500000026016720009927768213","digitable_line":"33690.00009   26016.720000   99277.682136   3   13110000010050","our_number":"9927768"}'
        2. Alteração:
          description: Notificação enviada quando há alteração de um boleto.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/WebhookNotification"
                  - type: object
                    properties:
                      service:
                        type: string
                        examples:
                          - BANK_SLIP
                      date_time:
                        type: string
                        description: Data e hora de envio da notificação
                        examples:
                          - 2025-11-27T20:12:12.089629237Z
                      status:
                        type: string
                        description: Status da notificação
                        examples:
                          - CREATED
                      information:
                        type: string
                        description: É o objeto atualizado. Este objeto será diferente, conforme o
                          "service" utilizado.
                        examples:
                          - '"{\"id\":\"01KB3EXEFZRA47PV9HJBFYJYYK\",\"external_reference_id\":\"SCMfL3ewh\",\"amount\":200.00,\"status\":\"CREATED\",\"emission_date\":\"2025-11-27\",\"due_date\":\"2025-12-31\",\"instructions\":[\"1)
                            Não receber após o vencimento\",\"2) Não receber
                            após o vencimento\",\"3) Não receber após o
                            vencimento\",\"4) Não receber após o
                            vencimento\"],\"internal_id\":\"9928571\",\"digitable_line\":\"33690.00009   26016.720000   99285.712131   5   13110000010050\",\"bar_code\":\"33695131100000100500000026016720009928571213\",\"discount\":{\"discount_type\":\"V\",\"first\":{\"value\":4.15,\"dead_line\":4},\"second\":{\"value\":2.50,\"dead_line\":3},\"third\":{\"value\":3.78,\"dead_line\":2}},\"interest\":{\"type\":\"V\",\"value\":12.35,\"dead_line\":0},\"fine\":{\"type\":\"V\",\"value\":14.25,\"dead_line\":0},\"payer\":{\"name\":\"PAGADOR
                            DA
                            SILVA\",\"tax_id\":\"10551349727\",\"email\":\"pagador@email.com.br\",\"address\":{\"street\":\"AV.
                            NOVE DE
                            JULHO\",\"number\":123,\"complement\":\"Complemento\",\"city\":\"Cidade\",\"state\":\"SP\",\"zip_code\":\"05093000\"}},\"our_number\":\"9928571\"}"'
                      expire_at:
                        type: string
                        description: Informa a data de expiração da notificação, data em que a
                          notificação será excluida de nosso banco de dados.
                          Campo apenas para controle interno. Não impacta sua
                          funcionalidade. Seu formato é timestamp.
                        examples:
                          - "1795810126"
        3. Cancelamento:
          description: (Em breve)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    examples:
                      - Exemplo não mapeado
        4. Pagamento:
          description: Notificação enviada quando o pagamento de um boleto é feito com
            sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    examples:
                      - Exemplo não mapeado
  bolepix:
