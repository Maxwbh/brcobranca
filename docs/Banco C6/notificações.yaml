  pix:
    get:
      tags:
        - Notificações de PIX
      summary: Notificações da API de PIX
      description: >-
        ### Importante


        Para utilizar webhooks para notificações de PIX, é necessário seguir o
        fluxo e os endpoints descritos na documentação da API de PIX.


        Esta documentação apresenta apenas os callbacks recebidos, não o
        processo de configuração e envio dessas notificações.


        Para detalhes sobre como configurar webhooks e receber notificações de
        PIX, acesse a documentação <b><a
        href="https://developers.c6bank.com.br/apis/pix">clicando aqui</a></b>


        <br>

        <hr>


        Se você já fez a configuração do seu sistema para receber notificações
        de PIX.

        Nesta área, apresentamos as possíveis notificações que você poderá
        receber ao cadastrar um webhook no serviço.


        Notificações exemplificadas:

        - <b>Pagamento: </b>

          Enviado quando o pagamento de um PIX é feito com sucesso.

          Status: PAID

          Pagamentos não são registrados manualmente (não são notificados após o uso de um endpoint). Eles são processados automaticamente pelo fluxo, que valida o status da transação e envia a notificação correspondente.
      responses:
        1. Pagamento:
          description: Notificação enviada quando um PIX é pago com sucesso.
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      $ref: "#/components/schemas/WebhookNotificationPix"
  pix-automatico:
    get:
      tags:
        - Notificações de PIX
      summary: Notificações da API de PIX Automático
      description: >-
        ### Importante


        Para utilizar webhooks para notificações de PIX Automático, é necessário
        seguir o fluxo e os endpoints descritos na documentação da API de PIX.


        Esta documentação apresenta apenas os callbacks recebidos, não o
        processo de configuração e envio dessas notificações.


        Para detalhes sobre como configurar webhooks e receber notificações de
        PIX Automático, acesse a documentação <b><a
        href="https://developers.c6bank.com.br/apis/pix-automatico">clicando
        aqui</a></b>


        <br>

        <hr>


        Se você já fez a configuração do seu sistema para receber notificações
        de PIX Automático.

        Ao lado, apresentamos as possíveis notificações que você poderá receber
        ao cadastrar um webhook no serviço.


        Notificações de <b>recorrência</b> exemplificadas:

        - <b>1. Criada: </b>

          Enviado quando um PIX Automático é criado com sucesso.

          Status: CRIADA
        - <b>2. Aprovada: </b>

          Enviado quando um PIX Automático é aprovado.

          Status: APROVADA
        - <b>3. Cancelada: </b>

          Enviado quando um PIX Automático é cancelado.

          Status: CANCELADA

        <hr>


        Notificações de <b>cobrança recorrente</b> exemplificadas:

        - <b>4. Criada: </b>

          Enviado quando um PIX Automático é criado com sucesso.

          Status: CRIADA
      responses:
        1. Criada:
          description: Notificação enviada quando um PIX Automático é criado com sucesso.
            (Recorrência)
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      Criada:
                        description: Notificação enviada quando um PIX Automático é criado com sucesso.
                        examples:
                          - |
                            {[{"idRec":"RR3187249520260428NOhZsHwdJUv","status":"CRIADA","atualizacao":[{"status":"CRIADA","data":"2026-04-28T17:36:40.090Z"}],"encerramento":null,"ativacao":{"tipoJornada":"AGUARDANDO_DEFINICAO","dadosJornada":null}}]}
        2. Aprovada:
          description: Notificação enviada quando um PIX Automático é aprovado.
            (Recorrência)
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      Aprovada:
                        description: Notificação enviada quando um PIX Automático é aprovado.
                        examples:
                          - |
                            {[{"idRec":"RR3187249520260428NOhZsHwdJUv","status":"APROVADA","atualizacao":[{"status":"CRIADA","data":"2026-04-28T17:36:40.090Z"},{"status":"APROVADA","data":"2026-04-28T18:07:19.492Z"}],"encerramento":null,"ativacao":{"tipoJornada":"JORNADA_2","dadosJornada":null}}]}
        3. Cancelada:
          description: Notificação enviada quando um PIX Automático é cancelado.
            (Recorrência)
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      Cancelada:
                        description: Notificação enviada quando um PIX Automático é cancelado.
                        examples:
                          - |
                            {[{"idRec":"RR3187249520260428NOhZsHwdJUv","status":"CANCELADA","atualizacao":[{"status":"CRIADA","data":"2026-04-28T17:36:40.090Z"},{"status":"APROVADA","data":"2026-04-28T18:07:19.492Z"},{"status":"CANCELADA","data":"2026-04-28T18:16:30.143Z"}],"encerramento":{"solicitante":"PSP_PAGADOR","codigo":"SLDB","descricao":"Cancelamento solicitado pelo usuário pagador"},"ativacao":{"tipoJornada":"JORNADA_2","dadosJornada":null}}]}
        4. Criada:
          description: Notificação enviada quando um PIX Automático é criado com sucesso.
            (Cobrança recorrente)
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      Criada:
                        description: Notificação enviada quando um PIX Automático é criado com sucesso.
                        examples:
                          - |
                            {[{"idRec":"RR3187249520260506L5O1cJ375iC","txid":"31872495Tx0ngVlMTsJ6SQpF41Ls9x8QrGc","status":"ATIVA","atualizacao":[{"status":"CRIADA","data":"2026-05-06T17:33:42.608Z"},{"status":"ATIVA","data":"2026-05-06T17:33:46.691Z"}],"tentativas":[{"dataLiquidacao":"2026-05-15","tipo":"AGND","status":"SCHEDULED","endToEndId":"E31872495202605151500flVwy5Mc4Z9"}]}]}
components:
  parameters:
    ContentType:
      in: header
      name: Content-Type
      description: Tipo do conteúdo da requisição
      schema:
        type: string
      required: true
      examples:
        default:
          value: application/x-www-form-urlencoded
    PartnerSoftwareName:
      in: header
      name: partner-software-name
      description: Nome do software do parceiro
      schema:
        type: string
      required: false
      examples:
        default:
          value: Super PDV
    PartnerSoftwareVersion:
      in: header
      name: partner-software-version
      description: Versão do software do parceiro
      schema:
        type: string
      required: false
      examples:
        default:
          value: 1.0.0
    Service:
      in: query
      name: service
      description: Nome do serviço
      schema:
        type: string
        enum:
          - BANK_SLIP
          - CHECKOUT
      required: true
      examples:
        default:
          value: BANK_SLIP
  schemas:
    ClientId:
      type: string
      description: Client Id vinculado ao webhook.
      readOnly: true
      examples:
        - 6abeb8cd-3dda-4f3a-b038-3b55c9d87d6a
    CreatedAt:
      type: string
      description: Data e hora de envio da notificação
      readOnly: true
      examples:
        - 2025-11-26T18:02:23.301232079Z
    Service:
      type: string
      description: >-
        É o serviço para qual você deseja receber notificações. As notificações
        são enviadas somente para a mesma chave de integração que gera o objeto
        a ser notificado.


        Por exemplo: Digamos que se você tinha duas credenciais de integração
        (client_id A e client_id B) e cadastre um webhook para cada uma delas,
        usando URLs diferentes.

        Ao gerar um boleto usando o client_id A, a notificação de pagamento
        deste boleto será enviada para a URL cadastrada pelo mesmo client_id.

        Ao mesmo tempo, boletos cadastrados pelo client_id B serão somente
        notificados a webhook criado por essa mesma chave.


        Isso é particularmente importante caso você faça uso de um mesmo produto
        (boleto, por exemplo) através de dois sistemas distintos.
      enum:
        - BANK_SLIP
        - BANK_SLIP_PIX
        - CHECKOUT
      examples:
        - BANK_SLIP
    URL:
      type: string
      description: URL na qual você deseja receber a chamada de webhook. Um ponto de
        atenção importante é que somente são aceitas URLs seguras (https).
      examples:
        - https://www.meuendereco.com.br/webhook/xpto
    WebhookRequest:
      type: object
      required:
        - url
        - service
      properties:
        url:
          $ref: "#/components/schemas/URL"
        service:
          $ref: "#/components/schemas/Service"
    WebhookResponse:
      type: object
      properties:
        service:
          $ref: "#/components/schemas/Service"
        client_id:
          $ref: "#/components/schemas/ClientId"
        url:
          $ref: "#/components/schemas/URL"
        created_at:
          $ref: "#/components/schemas/CreatedAt"
    WebhookNotification:
      type: object
      properties:
        external_id:
          type: string
          description: É o id do objeto que está sendo notificado.
          examples:
            - 19BE50723DAA4B0C91789457DC
        date_time:
          type: string
          description: Data e hora de envio da notificação
          examples:
            - 2025-11-26T18:02:36.261549917Z
        client_id:
          $ref: "#/components/schemas/ClientId"
        partner_id:
          type: string
          description: É o identificador do parceiro associado a esta notificação
          examples:
            - 01J6W5RJTVB5CV1Z8QAB1K08QG
        service:
          $ref: "#/components/schemas/Service"
    WebhookNotificationPix:
      date_time:
        type: string
        description: Data e hora de envio da notificação
        examples:
          - 2025-12-01T16:43:54.192482677Z
      status:
        type: string
        description: Status da notificação
        examples:
          - PAID
      service:
        $ref: "#/components/schemas/Service"
        enum:
          - PIX
        examples:
          - PIX
      key:
        type: string
        description: Chave PIX utilizada na transação
        examples:
          - 23e454c1-c65b-4b28-9348-e4dd026aa27b
      tax_id:
        type: string
        description: Identificador único da transação
        examples:
          - "99367503000167"
      information:
        type: string
        description: É o objeto atualizado. Este objeto será diferente, conforme o
          "service" utilizado.
        examples:
          - |
            {"pix":[{"endToEndId":"E31872495202512011643tabwNhezy94","valor":"100.00","chave":"23e454c1-c65b-4b28-9348-e4dd026aa27b","horario":"2025-12-01T19:43:48.944Z"}]}
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
