              schema:
                type: object
                properties:
                  message:
                    type: string
                    examples:
                      - Exemplo não mapeado
        6. Cancelamento:
          description: (Em breve)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    examples:
                      - Exemplo não mapeado
        7. Pagamento:
          description: Notificação enviada quando um link de pagamento é pago com sucesso.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/WebhookNotification"
                  - type: object
                    properties:
                      service:
                        type: string
                        examples:
                          - CHECKOUT
                      date_time:
                        type: string
                        description: Data e hora de envio da notificação
                        examples:
                          - 2025-11-27T20:12:12.089629237Z
                      status:
