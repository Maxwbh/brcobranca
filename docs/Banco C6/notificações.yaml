                          notificação será excluida de nosso banco de dados.
                          Campo apenas para controle interno. Não impacta sua
                          funcionalidade. Seu formato é timestamp.
                        examples:
                          - "1795887530"
        3. Autorização:
          description: (Em breve)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    examples:
                      - Exemplo não mapeado
        4. Negado:
          description: Notificação enviada quando um link de pagamento é negado.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/WebhookNotification"
