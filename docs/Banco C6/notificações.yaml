  checkout:
    get:
      tags:
        - Notificações de Checkout
      summary: Notificações da API de Checkout​
      description: >-
        Nesta área, apresentamos as possíveis notificações que você poderá
        receber ao cadastrar um webhook para uso com a API de Checkout.


        Caso tenha dúvidas no uso da API para as notificações de Checkout,
        visite a documentação: <b><a
        href="https://developers.c6bank.com.br/apis/checkout">Checkout</a></b>


        Notificações exemplificadas:

        - <b>Criação: </b>

          Enviado quando houver sucesso a geração de um link de pagamento.

          Status: CREATED

          Endpoint da API: /v1/checkouts/

          <br>
          <hr>

        - <b>Expiração: </b>

          Enviado quando houver a expiração de um link de pagamento.

          Status: EXPIRED

          A expiração pode ser realizada através do endpoint da API de checkout: /v1/checkouts/

          Porém, a expiração de um link também pode ocorrer de forma automática pelo fluxo.

          <br>
          <hr>

        - <b>Negado: </b>

          Enviado quando o pagamento de um link de pagamento é negado/rejeitado.

          Status: DECLINED

          Rejeições não são registradas manualmente (não são notificadas após o uso de um endpoint). Elas são processadas automaticamente pelo fluxo, que valida o status da transação e envia a notificação correspondente.

          <br>
          <hr>

        - <b>Pagamento: </b>

          Enviado quando o pagamento de um link de pagamento é pago com sucesso.

          Status: PAID

          Pagamentos não são registrados manualmente (não são notificados após o uso de um endpoint). Eles são processados automaticamente pelo fluxo, que valida o status da transação e envia a notificação correspondente.
      responses:
        1. Criação:
          description: Enviado quando houver sucesso a geração de um link de pagamento.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/WebhookNotification"
                  - type: object
                    properties:
                      service:
                        type: string
                        examples:
                          - CHECKOUT
                      date_time:
                        type: string
                        description: Data e hora de envio da notificação
                        examples:
                          - 2025-11-27T20:12:12.089629237Z
                      status:
                        type: string
                        description: Status da notificação
                        examples:
                          - CREATED
                      information:
                        type: string
                        description: É o objeto atualizado. Este objeto será diferente, conforme o
                          "service" utilizado.
                        examples:
                          - '{"external_id":"c07bc13a-1b5a-4882-abe8-bc07efa5f167","date_time":"2025-12-18T14:58:51.716648139Z","status":"CREATED","client_id":"913dc8cd-2d75-46ea-abed-51f0dad85c6d","partner_id":"00010","service":"CHECKOUT","information":"{\"id\":\"c07bc13a-1b5a-4882-abe8-bc07efa5f167\",\"url\":\"https://payment.c6pay.com.br/payment/c07bc13a-1b5a-4882-abe8-bc07efa5f167\"}"}'
        2. Expiração:
          description: Notificação enviada quando link de pagamento expira.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/WebhookNotification"
                  - type: object
                    properties:
                      service:
                        type: string
                        examples:
                          - CHECKOUT
                      date_time:
                        type: string
                        description: Data e hora de envio da notificação
                        examples:
                          - 2025-11-27T20:12:12.089629237Z
                      status:
                        type: string
                        description: Status da notificação
                        examples:
                          - EXPIRED
                      information:
                        type: string
                        description: É o objeto atualizado. Este objeto será diferente, conforme o
                          "service" utilizado.
                        examples:
                          - '{"id":"7cab634b-32ca-461d-9c6d-4d596879a14f","status":"EXPIRED","external_reference_id":"A123456789","amount":123.45,"description":"Cobrança
                            do produto A, para o cliente B, pedido
                            1234.","redirect_url":"http://www.seusite.com.br/finalizaPedido","intention_date_time":"2025-11-28T17:38:50Z","transaction_time":"null","expiration_date_time":"2025-11-28T17:40:05Z","payer":{},"payment":{"card":{"type":"CREDIT","installments":1,"fixed_installments":true,"authenticate":"NOT_REQUIRED"}}}'
