    | [Revisar cobrança recorrente](pix-automatico#tag/cobr/patch/cobr/{txid}) |
    | [Criar cobrança recorrente](pix-automatico#tag/cobr/post/cobr) |
    | [Consultar cobrança recorrente](pix-automatico#tag/cobr/get/cobr) |
