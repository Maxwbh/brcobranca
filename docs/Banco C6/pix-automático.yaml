paths:
  /rec/{recUrlAccessToken}:
    servers:
      - url: https://qrcode.c6pix.com/public/v1/
        description: Servidor de produção deste endpoint.
    get:
      parameters:
        - name: recUrlAccessToken
          in: path
          required: true
          schema:
            type: string
          examples:
            default:
              value: nqq9PyJRoitX5UI9YqQ2GOvHBrYJ2os9IfUmTv7dOU963040BA4
      tags:
        - RecPayload
      summary: Rec Payload
      description: |-
        ## Endpoint (location) que serve um payload que representa uma recorrência.

        No momento em que o usuário pagador efetua a leitura de um QR Code composto gerado pelo recebedor, esta URL será acessada e seu conteúdo consiste em uma estrutura JWS.
        As informações sobre a segurança no acesso às urls encontram-se no Manual de Segurança do Pix disponível nesse __[link](https://www.bcb.gov.br/estabilidadefinanceira/comunicacaodados)__.

        A API atual é pública e não está integrada aos endpoints do servidor do C6 Bank. Ela é realizada diretamente por meio do endereço apresentado quando um QR Code é gerado, disponível no campo "CopiaECola".

        Exemplo: copiaEcola:  "00020101021226180014br.gov.bcb.pix5204000053039865802BR5903PIX6009SAO PAULO62070503***80980014br.gov.bcb.pix2576qrcode-h.c6pix.com/public/v1/rec/nqq9PyJRoitX5UI9YqQ2GOvHBrYJ2os9IfUmTv7dOU963040BA4",

        Então, a URL do QR Code acima é: **https://qrcode-h.c6pix.com/public/v1/rec/nqq9PyJRoitX5UI9YqQ2GOvHBrYJ2os9IfUmTv7dOU**

        Se deseja executar este endpoint em **homologação**, utilize esse endpoint:
        https://qrcode-h.c6pix.com/public/v1/rec/{recUrlAccessToken}

        Se deseja executar este endpoint em **produção**, utilize esse endpoint:
        https://qrcode.c6pix.com/public/v1/rec/{recUrlAccessToken}
      responses:
        "200":
          description: |-
            # Descrição do Retorno
            O retorno desse endpoint é um objeto que apresenta estrutura JWS, conforme especificado no manual de segurança. Segue um exemplo:

            ```jws
            eyJ4NXQjUzI1NiI6IkJOVkdUamZsRTVBaUplWGhHbTZSaGtGUXkwQ25pejJXSlF5cTZhQ0pnTFkiLCJqa3UiOiJodHRwczpcL1wvcXItaC5zYW5kYm94LnBpeC5iY2IuZ292LmJyXC9yZXN0XC9qd2tzLmpzb24iLCJraWQiOiJOMjROSVg5R3Z3bm4ycGktV09IOG9RQ2JkSGlaSFdpbnJvWllxZGhxMlYwUENJIiwiYWxnIjoiUlMyNTYifQ..JQ3nwpN75M7ADuFQD1lAYRU_3QIkU34OCGXcqmn0dmmvl_JYQggZDY-2cN9waqZtf0duJkDs9EcRu-pNZQZlNMjI7DCYCNfXOgiiofdQqMikDh-D6Zq82EkiUqS7cuTg1-GWylCTF9gH6-p_D-dhYPvf-s4FinbjZNwhkX8Sn-OhlLMS8roIWSMjo_J1hN4DdL-Q5zgZBb7Hbt4OZ3CnD1GNbnsdUUyPyy2GfmIUWZEnQ2rY7gVuI7chUAksYeZVaJiH34saBw4Ou8RjHbSGmeWFLmjiTSQYisyQEyotStu6GnHLS36ElNDVlZWOUnb87N3H5FAccWaIQhit3C4wmA
            ```

            Este objeto JWS assinado deve ser validado pelo pagador. Maiores detalhes técnicos a respeito da especificação
            de segurança encontram-se no __[Manual de Segurança do Pix](https://www.bcb.gov.br/estabilidadefinanceira/pix)__.

            Conforme pode-se verificar no exemplo acima, o objeto JWS apresenta três fragmentos separados pelo caractere `.` (ponto). São eles: `header`, `payload` e `signature`.

            Em termos de funcionalidade, o fragmento que interessa ao pagador é o `payload`, que apresenta estrutura conforme especificada pelo `schema` do presente endpoint, contendo detalhes concernentes à recorrência.
          content:
