            - $ref: "#/components/schemas/DadosBancariosRecebedor"
    PayloadLocationRecSolicitada:
      type: object
      title: Location do Payload Solicitada
      description: Identificador da localização do payload solicitada.
      required:
        - tipo
      properties:
        tipo:
          type: string
          title: Tipo da cobrança
          enum:
            - rec
    PayloadLocationRecGerada:
      type: object
      title: Location do Payload Completa
      description: Identificador da localização do payload completo.
      required:
        - id
        - location
        - tipo
        - criacao
      properties:
        id:
          $ref: "#/components/schemas/PayloadLocationRecId"
        location:
          type: string
          title: Localização do payload
          description: Localização do Payload a ser informada na criação da recorrência.
          maxLength: 77
          format: uri
          readOnly: true
          examples:
            - pix.example.com/qr/v2/rec/2353c790eefb11eaadc10242ac120002
        criacao:
          type: string
          format: date-time
          title: Data de Criação
          description: Data e hora em que a location foi criada. Respeita RFC 3339.
          readOnly: true
    PayloadLocationRecCompleta:
      type: object
      title: Location do Payload Completa
      description: Identificador da localização do payload completo.
      allOf:
        - $ref: "#/components/schemas/PayloadLocationRecGerada"
        - type: object
          properties:
            idRec:
              $ref: "#/components/schemas/RecId"
    ParametrosConsultaRec:
      type: object
      title: Parâmetros de Consulta de Recorrências
      description: Parâmetros utilizados para a realização de uma consulta de recorrências.
      required:
        - inicio
        - fim
        - paginacao
      properties:
        inicio:
          type: string
          format: date-time
          title: Data de Início
          description: Data inicial utilizada na consulta. Respeita RFC 3339.
          examples:
            - 2020-04-01T00:00:00Z
        fim:
          type: string
          format: date-time
          title: Data de Fim
          description: Data de fim utilizada na consulta. Respeita RFC 3339.
          examples:
            - 2020-04-01T17:00:00Z
        cpf:
          type: string
          title: CPF
          pattern: /^\d{11}$/
          description: Filtro pelo CPF do devedor. Não pode ser utilizado ao mesmo tempo
            que o CNPJ.
        cnpj:
          type: string
          title: CNPJ
          pattern: ^[0-9A-Z]{14}$
          description: Filtro pelo CNPJ do devedor. Não pode ser utilizado ao mesmo tempo
            que o CPF.
        locationPresente:
          type: boolean
          description: Filtro pela existência de location vinculada.
        status:
          type: string
          title: Status do registro da recorrência
          description: Filtro pelo status das recorrências.
        recebedor:
          type: object
          title: Recebedor
          properties:
            convenio:
              type: string
              title: Convênio
              description: Convênio entre usuário e participante recebedor.
              maxLength: 60
        paginacao:
          $ref: "#/components/schemas/Paginacao"
    ParametrosConsultaCobR:
      type: object
      title: Parâmetros de Consulta de Cobrança
      description: Parâmetros utilizados para a realização de uma consulta de cobranças.
      required:
        - inicio
        - fim
        - paginacao
      properties:
        inicio:
          type: string
          format: date-time
          title: Data de Início
          description: Data inicial utilizada na consulta. Respeita RFC 3339.
          examples:
            - 2020-04-01T00:00:00Z
        fim:
          type: string
          format: date-time
          title: Data de Fim
          description: Data de fim utilizada na consulta. Respeita RFC 3339.
          examples:
            - 2020-04-01T17:00:00Z
        idRec:
          $ref: "#/components/schemas/RecId"
        cpf:
          type: string
          title: CPF
          pattern: /^\d{11}$/
          description: Filtro pelo CPF do devedor. Não pode ser utilizado ao mesmo tempo
            que o CNPJ.
        cnpj:
          type: string
          title: CNPJ
          pattern: ^[0-9A-Z]{14}$
          description: Filtro pelo CNPJ do devedor. Não pode ser utilizado ao mesmo tempo
            que o CPF.
        status:
          type: string
          title: Status do registro da cobrança
          description: Filtro pelo status das cobranças.
        recebedor:
          type: object
          title: Recebedor
          properties:
            convenio:
              type: string
              title: Convênio
              description: Convênio entre usuário e participante recebedor.
              maxLength: 60
        paginacao:
          $ref: "#/components/schemas/Paginacao"
    CobsRConsultadas:
      type: object
      title: Cobranças recorrentes consultadas
      required:
        - parametros
        - cobsr
      properties:
        parametros:
          $ref: "#/components/schemas/ParametrosConsultaCobR"
        cobsr:
          type: array
          title: Lista de cobranças
          items:
            allOf:
              - $ref: "#/components/schemas/CobRCompleta"
    RecsConsultadas:
      type: object
      title: Recorrencias consultadas
      required:
        - parametros
        - recs
      properties:
        parametros:
          $ref: "#/components/schemas/ParametrosConsultaRec"
        recs:
          type: array
          title: Lista de recorrências
          items:
            allOf:
              - $ref: "#/components/schemas/RecCompletaPesquisada"
    PixAutomatico:
      type: object
      title: Pix
      required:
        - txid
        - endToEndId
        - valor
        - horario
      properties:
        endToEndId:
          $ref: "#/components/schemas/EndToEndId"
        txid:
          allOf:
            - $ref: "#/components/schemas/TxId"
            - pattern: "[a-zA-Z0-9]{1,35}"
        valor:
          type: string
          title: Valor do Pix.
          pattern: \d{1,10}\.\d{2}
          description: Valor do Pix.
          anyOf:
            - $ref: "#/components/schemas/PixValorOriginal"
            - $ref: "#/components/schemas/PixValorJuros"
            - $ref: "#/components/schemas/PixValorMulta"
            - $ref: "#/components/schemas/PixValorAbatimento"
            - $ref: "#/components/schemas/PixValorDesconto"
        horario:
          type: string
          format: date-time
          title: Horário
          description: Horário em que o Pix foi processado no PSP.
        infoPagador:
          type: string
          title: Informação livre do pagador
          maxLength: 140
        devolucoes:
          type: array
          title: Devoluções
          items:
            $ref: "#/components/schemas/DevolucaoPixAutomatico"
    DevolucaoPixAutomatico:
      type: object
      title: Devolução
      required:
        - id
        - rtrId
        - valor
        - horario
        - status
      properties:
        id:
          $ref: "#/components/schemas/DevolucaoId"
        rtrId:
          type: string
          title: RtrId
          description: ReturnIdentification que transita na PACS004.
          pattern: "[a-zA-Z0-9]{32}"
          minLength: 32
          maxLength: 32
          examples:
            - D12345678202009091000abcde123456
        valor:
          type: string
          title: Valor a devolver.
          pattern: \d{1,10}\.\d{2}
          description: Valor a devolver.
        natureza:
          $ref: "#/components/schemas/DevolucaoNaturezaPixAutomatico"
        descricao:
          type: string
          title: Mensagem ao pagador relativa à devolução.
          maxLength: 140
          description: O campo `descricao`, opcional, determina um texto a ser apresentado
            ao pagador contendo informações sobre a devolução. Esse texto será
            preenchido, na pacs.004, pelo PSP do recebedor, no campo
            RemittanceInformation. O tamanho do campo na pacs.004 está limitado
            a 140 caracteres.
        horario:
          type: object
          properties:
            solicitacao:
              type: string
              format: date-time
              title: Horário de solicitação
              description: Horário no qual a devolução foi solicitada no PSP.
            liquidacao:
              type: string
              format: date-time
              title: Horário de liquidação
              description: Horário no qual a devolução foi liquidada no PSP.
        status:
          type: string
          title: Status
          description: Status da devolução.
          enum:
            - EM_PROCESSAMENTO
            - DEVOLVIDO
            - NAO_REALIZADO
        motivo:
          type: string
          title: Descrição do status.
          description: >
            # Status da Devolução


            Campo opcional que pode ser utilizado pelo PSP recebedor para
            detalhar os motivos

            de a devolução ter atingido o status em questão.

            Pode ser utilizado, por exemplo, para detalhar o motivo de a
            devolução não ter sido realizada.
          maxLength: 140
    ParametrosConsultaPayloadLocationRec:
      type: object
      title: Parâmetros de consulta de locations
      description: Parâmetros utilizados para a realização de uma consulta de locations.
      required:
        - inicio
        - fim
        - paginacao
      properties:
        inicio:
          type: string
          format: date-time
          title: Data de Início
          description: Data inicial utilizada na consulta. Respeita RFC 3339.
          examples:
            - 2020-01-01T00:00:00Z
        fim:
          type: string
          format: date-time
          title: Data de Fim
          description: Data de fim utilizada na consulta. Respeita RFC 3339.
          examples:
            - 2020-12-01T17:00:00Z
        idRecPresente:
          type: boolean
          description: Filtro pela existência de id da recorrência.
        recebedor:
          type: object
          title: Recebedor
          properties:
            convenio:
              type: string
              title: Convênio
              description: Convênio entre usuário e participante recebedor.
              maxLength: 60
        paginacao:
          $ref: "#/components/schemas/Paginacao"
    PayloadLocationRecConsultadas:
      type: object
      title: Locations Consultadas
      required:
        - parametros
        - loc
      properties:
        parametros:
          $ref: "#/components/schemas/ParametrosConsultaPayloadLocationRec"
        loc:
          type: array
          title: Lista de locations cadastradas
          items:
            allOf:
              - $ref: "#/components/schemas/PayloadLocationRecCompleta"
    ParametrosConsultaWebhooks:
      type: object
      title: Parâmetros de Consulta de Webhooks
      description: Parâmetros utilizados para a realização de uma consulta de Webhooks.
      properties:
        inicio:
          type: string
          format: date-time
          title: Data de Início
          description: Data inicial utilizada na consulta. Respeita RFC 3339.
          examples:
            - 2020-01-01T00:00:00Z
        fim:
          type: string
          format: date-time
          title: Data de Fim
          description: Data de fim utilizada na consulta. Respeita RFC 3339.
          examples:
            - 2020-12-01T17:00:00Z
        paginacao:
          $ref: "#/components/schemas/Paginacao"
    WebhooksRecConsultados:
      type: object
      title: Webhooks de Recorrências Consultados
      required:
        - webhooksrec
      properties:
        parametros:
          $ref: "#/components/schemas/ParametrosConsultaWebhooks"
        webhooksrec:
          type: array
          title: Lista de Webhooks de Recorrências consultados
          items:
            allOf:
              - $ref: "#/components/schemas/WebhookRecCompleto"
    Paginacao:
      type: object
      title: Paginação
      required:
        - paginaAtual
        - itensPorPagina
        - quantidadeDePaginas
        - quantidadeTotalDeItens
      properties:
        paginaAtual:
          type: integer
          title: Página atual
          description: Número da página recuperada.
          minimum: 0
        itensPorPagina:
          type: integer
          title: Itens por página
          description: Quantidade de registros retornado na página.
          minimum: 1
        quantidadeDePaginas:
          type: integer
          title: Quantidade de páginas
          description: Quantidade de páginas disponíveis para consulta.
          minimum: 1
        quantidadeTotalDeItens:
          type: integer
          title: Quantidade total de itens
          description: Quantidade total de itens disponíveis de acordo com os parâmetros
            informados.
          minimum: 0
    Violacao:
      type: object
      title: Violações
      properties:
        razao:
          type: string
          title: Descrição do erro
          description: Descrição do erro
          examples:
            - Valor da cobrança não pode ser 0.00
        propriedade:
          type: string
          title: Nome da propriedade
          description: Nome da propriedade
          examples:
            - cob.chave
        valor:
          type: string
          title: Valor da propriedade
          description: Valor da propriedade
          examples:
            - "061996671234"
    Problema:
      type: object
      required:
        - type
        - title
        - status
      properties:
        type:
          type: string
          format: uri
          description: URI de referência que identifica o tipo de problema. De acordo com
            a RFC 7807.
          examples:
            - https://pix.bcb.gov.br/api/v2/error/NaoEncontrado
        title:
          type: string
          description: Descrição resumida do problema.
          examples:
            - Not found
        status:
          type: integer
          description: Código HTTP do status retornado.
          examples:
            - 404
        detail:
          type: string
          description: Descrição completa do problema.
        correlationId:
          type: string
          description: Identificador de correlação do problema para fins de suporte
        violacoes:
          type: array
          items:
            $ref: "#/components/schemas/Violacao"
    Inicio:
      type: string
      format: date-time
      title: Data de início
      description: Filtra os registros cuja data de criação seja maior ou igual que a
        data de início. Respeita RFC 3339.
    Fim:
      type: string
      format: date-time
      title: Data de fim
      description: Filtra os registros cuja data de criação seja menor ou igual que a
        data de fim. Respeita RFC 3339.
  parameters:
    Authorization:
      in: header
      name: Authorization
      description: Token de acesso para autenticação. Deve ser enviado no formato
        "Bearer {{your_access_token}}".
      schema:
        type: string
      required: true
      examples:
        default:
          value: Bearer {{your_access_token}}
    paginaAtual:
      in: query
      name: paginacao.paginaAtual
      required: false
      schema:
        type: integer
        format: int32
        title: Página atual
        minimum: 0
        default: 0
        description: Página a ser retornada pela consulta. Se não for informada, o PSP
          assumirá que será 0.
    itensPorPagina:
      in: query
      name: paginacao.itensPorPagina
      required: false
      schema:
        type: integer
        format: int32
        title: Itens por Página
        minimum: 1
        maximum: 1000
        default: 100
        description: Quantidade máxima de registros retornados em cada página. Apenas a
          última página pode conter uma quantidade menor de registros.
  responses:
    RequisicaoInvalida:
      description: Problemas na requisição.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Problema"
    NaoEncontrado:
      description: Recurso solicitado não foi encontrado.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problema"
          examples:
            exemplo1:
              $ref: "#/components/examples/NaoEncontradoExample1"
    AcessoNegado:
      description: Requisição de participante autenticado que viola alguma regra de
        autorização.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problema"
          examples:
            exemplo1:
              $ref: "#/components/examples/AcessoNegadoExample1"
    ServicoIndisponivel:
      description: Serviço não está disponível no momento. Serviço solicitado pode
        estar em manutenção ou fora da janela de funcionamento.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problema"
          examples:
            exemplo1:
              $ref: "#/components/examples/ServicoIndisponivelExample1"
