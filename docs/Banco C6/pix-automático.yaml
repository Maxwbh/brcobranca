    | [Revisar solicitação de confirmação de recorrência](pix-automatico#tag/solicrec/patch/solicrec/{idSolicRec}) |
    ||
    | **API de Cobranças Recorrentes** |
    | [Criar cobrança recorrente](pix-automatico#tag/cobr/post/cobr) |
