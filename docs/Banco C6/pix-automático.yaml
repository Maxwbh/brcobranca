      <img src="/images/pix-automatico/jornadas-separadas/jornada02.png"
      alt="JornadaSeparada">
  - name: Jornada3
    x-displayName: Jornada 3
    description: >-
      Gerenciamento da <b>Jornada 3</b> de Pix Automático.

      <img src="/images/pix-automatico/jornadas-separadas/jornada03.png"
      alt="JornadaSeparada">

      **IMPORTANTE:** Caso deseje seguir com a jornada acima, é recomendado que
      uma **cobrança imediata** já tenha sido criada.

      Caso tenha dúvidas em como criar uma cobrança imediata, consulte a
      documentação de PIX disponível em nosso portal. Você pode acessá‑la
      através do __[link](https://developers.c6bank.com.br/apis/pix)__.
  - name: Jornada4
    x-displayName: Jornada 4
    description: >-
      Gerenciamento da <b>Jornada 4</b> de Pix Automático.

      <img src="/images/pix-automatico/jornadas-separadas/jornada04.png"
      alt="JornadaSeparada">

      **IMPORTANTE:** Caso deseje seguir com a jornada acima, é recomendado que
      uma **cobrança com vencimento** já tenha sido criada.

      Caso tenha dúvidas em como criar uma cobrança com vencimento, consulte a
      documentação de PIX disponível em nosso portal. Você pode acessá‑la
      através do __[link](https://developers.c6bank.com.br/apis/pix)__.
