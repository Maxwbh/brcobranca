    x-displayName: Jornada 1
    description: >-
      Gerenciamento da <b>Jornada 1</b> de Pix Automático.

      <img src="/images/pix-automatico/jornadas-separadas/jornada01.png"
      alt="JornadaSeparada">
  - name: Jornada2
    x-displayName: Jornada 2
    description: >-
