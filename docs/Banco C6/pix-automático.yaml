    | [Consultar webhook de recorrência](pix-automatico#tag/webhook/get/webhookrec) |
    | [Cancelar webhook de recorrência](pix-automatico#tag/webhook/delete/webhookrec) |
    | [Consultar webhook de cobranças recorrentes](pix-automatico#tag/webhook/get/webhookcobr) |
    | [Consultar webhook de cobranças recorrentes](pix-automatico#tag/webhook/get/webhookcobr) |
