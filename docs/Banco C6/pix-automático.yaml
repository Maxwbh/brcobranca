  schemas:
    TxId:
      type: string
      title: Id da Transação
      description: >-
        # Identificador da transação


        O campo `txid` determina o identificador da transação.

        O objetivo desse campo é ser um elemento que possibilite ao PSP do
        recebedor apresentar ao usuário recebedor a funcionalidade de
        conciliação de pagamentos.


        Na pacs.008, é referenciado como `TransactionIdentification <txId>` ou
        `idConciliacaoRecebedor`.


        Em termos de fluxo de funcionamento, o txid é lido pelo aplicativo do
        PSP do pagador e,

        depois de confirmado o pagamento, é enviado para o SPI via pacs.008.

        Uma pacs.008 também é enviada ao PSP do recebedor, contendo, além de
        todas as informações usuais

        do pagamento, o txid.

        Ao perceber um recebimento dotado de txid, o PSP do recebedor está apto
        a se comunicar com o usuário recebedor,

        informando que um pagamento específico foi liquidado.


        O txid é criado exclusivamente pelo usuário recebedor e está sob sua
        responsabilidade.

        O txid, no contexto de representação de uma cobrança, é único por
        CPF/CNPJ do usuário recebedor. Cabe ao

        PSP recebedor validar essa regra na API Pix.
      pattern: "[a-zA-Z0-9]{26,35}"
    EndToEndId:
      type: string
      title: Id fim a fim da transação
      description: EndToEndIdentification que transita na PACS002, PACS004 e PACS008
      pattern: "[a-zA-Z0-9]{32}"
      minLength: 32
      maxLength: 32
    DevolucaoId:
      type: string
      title: Id da Devolução
      description: Id gerado pelo cliente para representar unicamente uma devolução.
      pattern: "[a-zA-Z0-9]{1,35}"
    DevolucaoNaturezaPixAutomatico:
      type: string
      title: Natureza da Devolução
      description: >-
        Indica qual é a natureza da devolução. Uma devolução pode ser
        relacionada a um Pix comum (com códigos possíveis: `MD06` e `FR01` da
        pacs.004 e `REFU` da pacs.008). Na ausência deste campo a natureza deve
        ser interpretada como

        sendo de um Pix comum (`ORIGINAL`).


        As naturezas são assim definidas:
          - `ORIGINAL`: quando a devolução é solicitada pelo usuário recebedor e se refere a um Pix comum (`MD06`);
          - `MED_FRAUDE`: quando a devolução ocorre no âmbito do MED (Mecanismo Especial de Devolução) por fundada suspeita de fraude e se refere a um Pix comum (`FR01`).
          - `MED_PIX_AUTOMATICO`: reembolso total ou parcial ao participante do usuário pagador no âmbito do MED (Mecanismo Especial de Devolução) para o Pix Automático pela utilização de recursos próprios para ressarcimento do usuário pagador.(`REFU`);

        Os valores de devoluções são sempre limitados aos valores máximos a
        seguir:

        - Pix comum: o valor da devolução é limitado ao valor do próprio Pix (a
        natureza nesse caso pode ser: ORIGINAL, MED_PIX_AUTOMATICO ou
        MED_FRAUDE);
      enum:
        - ORIGINAL
        - MED_PIX_AUTOMATICO
        - MED_FRAUDE
    PayloadLocationRecId:
      type: integer
      format: int64
      title: Id da location
      description: Identificador da location a ser informada na criação de uma recorrência .
    Revisao:
      type: integer
      format: int32
      title: Revisão
      description: >-
        # O campo `revisao`


        Denota a revisão da cobrança.  Sempre começa em zero. Sempre varia em
        acréscimos de 1.


        O incremento em uma cobrança deve ocorrer sempre que um objeto da
        cobrança em questão for alterado.

        O campo `loc` é uma exceção a esta regra.


        Se em uma determinada alteração em uma cobrança, o único campo alterado
        for o campo `loc`,

        então esta operação não incrementa a revisão da cobrança.


        O campo `loc` não ocasiona uma alteração na cobrança em si.

        Não é necessário armazenar histórico das alterações do campo `loc` para
        uma determinada cobrança.

        Para os outros campos da cobrança, registra-se histórico.
      readOnly: true
