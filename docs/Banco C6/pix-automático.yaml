    RecCompleta:
      type: object
      title: Recorrência Completa
      required:
        - status
        - recebedor
      allOf:
        - type: object
          properties:
            idRec:
              $ref: "#/components/schemas/RecId"
        - $ref: "#/components/schemas/RecBase"
        - type: object
          properties:
            recebedor:
              oneOf:
                - $ref: "#/components/schemas/PessoaJuridicaRecorrencia"
              allOf:
                - type: object
                  properties:
                    convenio:
                      type: string
                      title: Convênio
                      description: Convênio entre usuário e participante recebedor.
                      maxLength: 60
        - $ref: "#/components/schemas/DadosPagadorRec"
        - $ref: "#/components/schemas/RecStatus"
        - $ref: "#/components/schemas/RecConfiguracao"
        - type: object
          properties:
            loc:
              allOf:
                - $ref: "#/components/schemas/PayloadLocationRecCompleta"
        - $ref: "#/components/schemas/RecAtualizacao"
        - $ref: "#/components/schemas/RecEncerramento"
        - type: object
          properties:
            solicitacao:
              type: array
              title: Solicitações vinculadas
              description: Solicitações vinculadas
              items:
                allOf:
                  - $ref: "#/components/schemas/SolicRecCompleta"
        - $ref: "#/components/schemas/RecAtivacao"
        - type: object
          properties:
            dadosQR:
              type: object
              title: Informações do QR Composto.
              description: >-
                Informações relacionadas aos parâmetros idRec e txid informados
                na requisição. Ao consultar uma recorrência via endpoint GET
                /rec/{idRec}?txid={txid}, o usuário recebedor pode optar pela
                consulta sem o txid ou por compor a requisição com um txid de
                uma cobrança imediata ou de uma cobrança com vencimento, de
                forma a obter o QR Composto para a jornada de interesse. Os
                dadosQR retornados variam de acordo com a jornada desejada,
                indicada pela presença dos parâmetros de interesse.

                No cenário em que existe apenas o idRec, sem txid de cobrança
                imediata ou de cobrança com vencimento, o sistema retorna a
                jornada JORNADA_2, com o QR Composto da recorrência. Quando
                existe idRec e também um txid de cobrança imediata, sem txid de
                cobrança com vencimento, o sistema retorna a jornada JORNADA_3,
                que representa o QR Composto da cobrança imediata associado à
                recorrência. No cenário em que existe idRec e txid de cobrança
                com vencimento, sem txid de cobrança imediata, o sistema retorna
                a jornada JORNADA_4, que representa o QR Composto da cobrança
                com vencimento associado à recorrência.

                Os campos dadosQR.jornada e dadosQR.pixCopiaECola somente serão
                retornados se todas as informações necessárias para a geração do
                QR Composto estiverem devidamente preenchidas tanto na
                recorrência quanto na eventual cobrança, dependendo da jornada
                correspondente.
              properties:
                jornada:
                  type: string
                  title: Jornada de ativação
                  enum:
                    - JORNADA_2
                    - JORNADA_3
                    - JORNADA_4
                pixCopiaECola:
                  type: string
                  title: Pix Copia e Cola correspondente Ã  RecorrÃªncia.
                  description: Este campo retorna o valor do Pix Copia e Cola correspondente
                    Ã  recorrÃªncia. Trata-se da sequÃªncia de caracteres que
                    representa o BR Code.
                  maxLength: 512
