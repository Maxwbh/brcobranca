    RecId:
      type: string
      title: ID Recorrência
      description: >-
        Identificador da Recorrência

          Regra de formação:
          - RAxxxxxxxxyyyyMMddkkkkkkkkkkk (29 caracteres; "case sensitive", isso é, diferencia letras maiúsculas e minúsculas), sendo:
          - "R":  fixo (1 caractere). "R" para a recorrência criada dentro do Pix;
          - "A": identificação da possibilidade de novas tentativas, sendo possíveis os valores "R" ou "N" (1 caractere). "R" caso a recorrência permita novas tentativas de pagamento pós vencimento, ou "N" caso não permita novas tentativas.
          - "xxxxxxxx":  identificação do agente que presta serviço para o usuário recebedor que gerou o ID Recorrência, podendo ser: o ISPB do participante direto, o ISPB do participante indireto ou os 8 primeiros caracteres do CNPJ do prestador de serviço de iniciação (8 caracteres alfanuméricos [A-Z|0-9]);
          - "yyyyMMdd":  data (8 caracteres) de criação da recorrência;
          - "kkkkkkkkkkk": sequencial criado pelo agente que gerou o ID Recorrência (11 caracteres alfanuméricos [a-z|A-Z|0-9]). Deve ser único dentro de cada "yyyyMMdd".

        Dessa forma, o ID da recorrência deve ser formado de acordo com um dos
        tipos a seguir:

        - "RRxxxxxxxxyyyyMMddkkkkkkkkkkk"; para recorrência criada dentro do Pix
        e que permite novas tentativas de pagamento pós vencimento; ou

        - "RNxxxxxxxxyyyyMMddkkkkkkkkkkk"; para recorrência criada dentro do Pix
        e que não permite novas tentativas de pagamento pós vencimento.
      pattern: "[a-zA-Z0-9]{29}"
      minLength: 29
      maxLength: 29
      examples:
        - RR1234567820240115abcdefghijk
    RecBase:
      title: Recorrência Base
      type: object
      required:
        - idRec
        - calendario
        - vinculo
        - retentativa
      properties:
        vinculo:
          type: object
          title: Descrição do Objeto da Recorrência
          required:
            - contrato
            - devedor
          description: Informações sobre o objeto da recorrência.
          properties:
            objeto:
              type: string
              title: Identificador do objeto de vínculo
              description: Campo de texto livre para informações referentes ao contrato que
                permitam ao usuário pagador reconhecer o objeto dos pagamentos
                periódicos por meio do Pix Automático.
              maxLength: 35
              examples:
                - - Conta de energia Av. Paulista, 1804
                  - Serviço de internet banda larga
                  - Assinatura anual
            devedor:
              description: O objeto devedor organiza as informações sobre o devedor da
                recorrência.
              oneOf:
                - $ref: "#/components/schemas/PessoaFisicaRecorrencia"
                - $ref: "#/components/schemas/PessoaJuridicaRecorrencia"
            contrato:
              type: string
              title: Objeto da autorização
              description: Número, identificador, ou código que representa o objeto da
                autorização (contrato, pedido etc.).
              maxLength: 35
        calendario:
          type: object
          title: Informações sobre calendário da recorrência
          required:
            - dataInicial
            - periodicidade
          description: Informações sobre calendário da recorrência
          properties:
            dataInicial:
              type: string
              format: date
              title: Data estimada de primeiro pagamento.
              description: Trata-se de uma data, no formato `YYYY-MM-DD`, segundo ISO 8601.
                Data estimada de primeiro pagamento.
              examples:
                - 2023-04-01
            dataFinal:
              type: string
              format: date
              title: Data final da vigência.
              description: Campo opcional que deve ser preenchido para autorizações com
                vigência pré-definida, devendo ser compatível com os valores
                informados em tipoFrequencia e a dataInicialRecorrencia. Não
                deve ser preenchido para autorizações por tempo indeterminado.
                Trata-se de uma data, no formato `YYYY-MM-DD`, segundo ISO 8601.
              examples:
                - 2023-04-01
            periodicidade:
              type: string
              title: Periodicidade das cobranças recorrentes.
              enum:
                - SEMANAL
                - MENSAL
                - TRIMESTRAL
                - SEMESTRAL
                - ANUAL
        valor:
          type: object
          properties:
            valorRec:
              type: string
              pattern: \d{1,10}\.\d{2}
              title: Valor da recorrência
              description: Campo opcional, deve ser preenchido apenas quando o valor dos
                pagamentos for fixo ou não for sujeito a alteração durante a
                vigência da autorização.
            valorMinimoRecebedor:
              type: string
              pattern: \d{1,10}\.\d{2}
              title: Valor mínimo da recorrência
              description: Campo opcional. Valor definido pelo usuário recebedor. Se o usuário
                pagador atribuir um valor máximo para os pagamentos daquela
                autorização, ele não poderá ser inferior ao piso definido pelo
                usuário recebedor. Não pode ser preenchido nas autorizações de
                valor fixo, ou seja, com campo valor preenchido.
