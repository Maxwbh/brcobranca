openapi: 3.1.1
info:
  title: PIX Automático
  version: 1.0.0
  description: |
    ## **O que esta API permite?**

    A API de Pix Automático permite automatizar pagamentos recorrentes, como mensalidades, assinaturas e prestações de serviço,
    por meio de uma única autorização do pagador. Após essa autorização, os valores são debitados automaticamente
    via Pix nas datas programadas, garantindo praticidade, segurança e pontualidade nos pagamentos.

    ________________

    ## **JORNADAS**

    As jornadas de Pix Automático são os diferentes fluxos (caminhos) definidos pelo Banco Central para que um usuário pagador
    autorize cobranças recorrentes via Pix. Elas estruturam como a autorização acontece, variando conforme o canal (push, QR Code, notificação externa, etc.)
    e a experiência desejada pela empresa e pelo cliente.

    Então, de forma simples, jornadas são modelos padronizados de ativação que permitem que uma empresa peça ao cliente autorização para cobrar automaticamente, semelhante ao débito automático, mas via Pix.
    Cada jornada possui um fluxo específico de como a autorização é iniciada, exibida ao usuário e confirmada.


    <div>
        <img src="/images/pix-automatico/jornadasmap1.jpeg" alt="Jornadas1">
        <img src="/images/pix-automatico/jornadasmap2.jpg" alt="Jornadas2">
    </div>


    <details>
      <summary align="center"><strong>JORNADA 1</strong></summary>

      **Jornada 1 – Autorização sem QR Code (Notificação via App)**

      Descrição: A autorização da recorrência ocorre sem uso de QR Code, a partir de uma oferta digital enviada ao pagador,
      que recebe uma notificação no aplicativo de sua instituição para confirmação.

      <img src="/images/pix-automatico/jornada01.png" alt="Jornada1">
      <img src="/images/pix-automatico/jornadas-separadas/jornada01.png" alt="JornadaSeparada1">

      <a href="pix-automatico#tag/jornada1/post/rec">Clique aqui para ir até o fluxo da Jornada 1</a>
    </details>
    <br>

    <details>
      <summary align="center"><strong>JORNADA 2</strong></summary>

      **Jornada 2 – Autorização com QR Code (Somente Dados da Recorrência)**

      Descrição: O QR Code contém exclusivamente os dados da recorrência, sem pagamento imediato associado.

      <img src="/images/pix-automatico/jornada02.png" alt="Jornada2">
      <img src="/images/pix-automatico/jornadas-separadas/jornada02.png" alt="JornadaSeparada2">

      <a href="pix-automatico#tag/jornada2/post/locrec">Clique aqui para ir até o fluxo da Jornada 2</a>
    </details>
    <br>

    <details>
      <summary align="center"><strong>JORNADA 3</strong></summary>

      **Jornada 3 – Autorização com QR Code (Pagamento Imediato + Recorrência)**

      Descrição: O QR Code combina: Pagamento imediato e Autorização da recorrência para cobranças futuras

      <img src="/images/pix-automatico/jornada03.png" alt="Jornada3">
      <img src="/images/pix-automatico/jornadas-separadas/jornada03.png" alt="JornadaSeparada3">

      <a href="pix-automatico#tag/jornada3/post/locrec">Clique aqui para ir até o fluxo da Jornada 3</a>
    </details>
    <br>

    <details>
      <summary align="center"><strong>JORNADA 4</strong></summary>

      **Jornada 4 – Autorização com QR Code (Pagamento/Agendamento + Oferta de Recorrência)**

      Descrição: O QR Code combina: Pagamento imediato e Autorização da recorrência para cobranças futuras

      <img src="/images/pix-automatico/jornada04.png" alt="Jornada4">
      <img src="/images/pix-automatico/jornadas-separadas/jornada04.png" alt="JornadaSeparada4">

      <a href="pix-automatico#tag/jornada4/post/locrec">Clique aqui para ir até o fluxo da Jornada 4</a>
    </details>

    <br>

    <details>
      <summary align="center"><strong>CASOS DE USO</strong></summary>

      **Caso de Uso: QR Code Composto**
      **Utilização de QR Code Composto apenas para ofertar uma recorrência**

      **Aplicação:** Prestadores de serviço que desejam ofertar o pagamento de cobranças recorrentes via Pix Automático. Corresponde à <a href="pix-automatico#tag/jornada2/post/rec">Jornada 2</a> de autorização.

      **Exemplos:** Serviços de Internet, Taxas de Condomínio.

      **Premissa:** deve existir uma recorrência já criada e ainda não autorizada.

      <blockquote>
      Para configurar a API Pix para esse caso de uso, o primeiro passo é criar uma “location”, a URL que exibirá os parâmetros da recorrência, e que será configurada no QR Code composto:

      Serviços invocados:
      * POST /locrec → será retornado o identificador da “location” e a URL que será utilizada para exibir os parâmetros da recorrência.
      * POST /rec → antes de mostrar o QR Code Composto ao usuário pagador, o usuário recebedor cria a recorrência com o identificador da “location” recebido do serviço anterior com todos os parâmetros da recorrência.

      <dl>	O usuário pagador (cliente) recebe uma oferta do usuário recebedor (fornecedor) para aderir ao Pix Automático via um QR Code composto com dados de recorrência. </dl>

      Serviços invocados:
      * GET /rec/{idRec} → após a definição da location e criação da recorrência, nos endpoints anteriores, o usuário recebedor acessa este endpoint para obtenção dos dados de recorrência com o campo ‘dadosQR’ preenchido com a informação de jornada 2 e o Pix Copia e Cola correspondente ao QR Composto desejado para a exibição ao usuário pagador.

      <dl> O cliente lê o QR Code composto por meio do app do seu PSP </dl>

      Serviço invocado:
      * GET /rec/{recUrlAccessToken} → o PSP Pagador lê os dados da recorrência para controle e apresentação ao usuário pagador para aceite.

      <dl> O cliente conclui a jornada 2, confirmando a autorização do Pix Automático para pagamentos àquele fornecedor. </dl>
      <dl> As próximas cobranças serão enviadas pelo usuário recebedor ao PSP pagador, passando pelo PSP recebedor, por meio de instruções de pagamento </dl>

      Serviço invocado:
      * POST /cobr → cria a cobrança recorrente com os dados pertinentes sendo gerado um txid para conciliação; ou PUT /cobr/{txid} → cria a cobrança recorrente com os dados pertinentes já informando um txid para conciliação.

      <dl> O PSP pagador realiza o pagamento das cobranças de forma automática, a partir das instruções de pagamento recebidas. </dl>

      Serviço invocado:
      * GET /cobr/{txid} → a qualquer momento este endpoint retorna os dados da cobrança com o Pix de pagamento correlato.

      </blockquote>
      <hr>

      **Caso de Uso: Pagamento imediato via QR Code Composto com dados dinâmicos e recorrência**

      **Aplicação** Prestadores de serviço, tipicamente de assinatura, em que o acesso ao serviço é disponibilizado imediatamente após o primeiro pagamento e as cobranças seguintes são realizadas periodicamente. Utilizado na <a href="pix-automatico#tag/jornada3">Jornada 3</a> de autorização do Pix Automático.

      **Exemplos:** Academia, Escolas.

      **Premissa:** deve existir uma recorrência já criada e ainda não autorizada.

      <blockquote>
      Caso de Uso: O usuário pagador deseja contratar um serviço de assinatura e entra em contato com o fornecedor informando que deseja realizar o pagamento das cobranças periódicas por meio do Pix Automático.

      O fornecedor gera um QR Code composto, contendo duas locations: uma para a cobrança imediata inicial e outra para os parâmetros da recorrência de cobranças futuras.

      Serviços invocados:
      * Endpoints para criação de cobrança imediata, já exemplificados, de forma a haver a location para a cobrança com um txid que será compartilhado com a recorrência.
      * POST /locrec → será retornado o identificador da “location” e a URL que será utilizada para exibir os parâmetros da recorrência.
      * POST /rec → antes de mostrar o QR Code Composto ao usuário pagador, o usuário recebedor cria a recorrência com o identificador da “location” recebido do serviço anterior com todos os parâmetros da recorrência informando também o txid, via campo ‘ativacao.dadosJornada.txid’ no payload, que será conciliado com o txid idêntico da cobrança imediata a ser paga.
      * GET /rec/{idRec}?txid={txid} → após a definição da location e criação da recorrência, nos endpoints anteriores, o usuário recebedor acessa este endpoint para obtenção dos dados de recorrência com o campo ‘dadosQR’ preenchido com a informação de jornada 3 e o Pix Copia e Cola correspondente ao QR Composto desejado para a exibição ao usuário pagador.


      <dl> O usuário pagador lê esse QR Code no app do seu PSP e dá início a uma jornada em que se realizam, simultaneamente, o pagamento imediato inicial e a autorização para o pagamento das cobranças futuras por meio do Pix Automático.</dl>

      <dl> Ao receber o primeiro pagamento imediato, o fornecedor disponibiliza instantaneamente o acesso ao serviço ao usuário pagador. </dl>

      Serviço habilitados:
      * POST /cobr ou PUT /cobr/{txid} → passam a ficar disponíveis para o usuário recebedor disparar as futuras cobranças recorrentes.

      <dl>As demais cobranças periódicas são pagas automaticamente por meio do Pix Automático.</dl>
      </blockquote>
      <hr>

      **Caso de Uso: Pagamento com vencimento via QR Code Composto com dados dinâmicos e recorrência**

      **Aplicação:** Prestadores de serviço cuja cobrança se dá de forma periódica desejam ofertar a seus clientes a possibilidade de pagamento dessas cobranças por meio do Pix Automático. Corresponde à <a href="pix-automatico#tag/jornada4">Jornada 4</a> de autorização.

      **Exemplos:** Empresas de Telefonia, água, luz.

      **Premissa:** deve existir uma recorrência já criada e ainda não autorizada.

      <blockquote>
      Prestador de serviço que realiza cobranças de forma periódica por meio de QR Codes dinâmicos com vencimento, passa a gerar QR Codes compostos, contendo a location dos dados da cobrança com vencimento usual mais a location dos parâmetros da recorrência.

      Serviços invocados:
      * Endpoints para criação de cobrança com vencimento, já exemplificados, de forma a haver a location para a cobrança.
      * POST /locrec → será retornado o identificador da “location” e a URL que será utilizada para exibir os parâmetros da recorrência.
      * POST /rec → antes de mostrar o QR Code Composto ao usuário pagador, usuário recebedor cria a recorrência com o identificador da “location” recebido do serviço anterior com todos os parâmetros da recorrência.
      * GET /rec/{idRec}?txid={txid} → após a definição da location e criação da recorrência, nos endpoints anteriores, o usuário recebedor acessa este endpoint para obtenção dos dados de recorrência com o campo ‘dadosQR’ preenchido com a informação de jornada 4 e o Pix Copia e Cola correspondente ao QR Composto desejado para a exibição ao usuário pagador.

      <dl>O usuário pagador, ao ler esse QR Code composto utilizando o app do seu PSP, percorrerá a jornada usual de pagamento da cobrança com vencimento.</dl>

      <dl>Ao final dessa jornada, o usuário pagador será questionado acerca do seu interesse em utilizar o Pix Automático para o pagamento das cobranças futuras referentes ao serviço em questão.</dl>

      <dl>Caso tenha interesse, será apresentada ao pagador a jornada de autorização do Pix Automático, contendo todos os parâmetros da recorrência.</dl>

      Serviço invocado:
      * GET /rec/{recUrlAccessToken} → o Psp Pagador lê os dados da recorrência para controle e apresentação ao usuário pagador para aceite.

      <dl>Confirmada a autorização pelo pagador, notifica-se o usuário recebedor e as cobranças seguintes são pagas automaticamente por meio do Pix Automático.</dl>
      </blockquote>
      <hr>

      **Caso de Uso: Inclusão de recorrências**

      **Aplicação:** usuários recebedores que desejam ofertar o pagamento via Pix Automático para seus clientes. A inclusão das recorrências é pré-requisito para o envio, aos clientes, de solicitações de autorização de pagamento usando o Pix Automático.

      <blockquote>
      O usuário recebedor, por meio do software de automação utilizado por ele, acessa a API Pix para a criação de uma recorrência, informando, dentre outras coisas, dados sobre o contrato vinculado às cobranças, o recebedor, a data de início das cobranças recorrentes, a periodicidade, e se a recorrência permite ou não retentativas após o vencimento.

      Serviços invocados:
      * POST /locrec → será retornado o identificador da “location” e a URL que será utilizada para exibir os parâmetros da recorrência.
      * POST /rec → antes de mostrar o QR Code Composto ao usuário pagador, usuário recebedor cria a recorrência com o identificador da “location” recebido do serviço anterior com todos os parâmetros da recorrência.

      <dl>Uma vez criada a recorrência, o usuário recebedor poderá enviar ao cliente solicitações de autorização de pagamento usando o Pix Automático por meio de QR Codes compostos (vide casos de uso da seção anterior) ou por meio do envio de uma solicitação de confirmação de recorrência.</dl>

      Serviço invocado:
      * POST /solicRec → o usuário recebedor envia uma solicitação de confirmação de recorrência informando o identificador da recorrência entre outros dados.
      </blockquote>
      <hr>

      **Caso de Uso: Envio de solicitação de confirmação de recorrência**

      **Aplicação:** usuários recebedores que tenham acordado diretamente com seus clientes que a forma de pagamento utilizada será o Pix Automático e desejam enviar o pedido de autorização para que o usuário pagador confirme pelo site ou app da sua instituição de relacionamento. Caracteriza a <a href="pix-automatico#tag/jornada1">Jornada 1</a> de autorização do Pix Automático.

      **Premissa:** deve existir uma recorrência já criada e ainda não autorizada.

      <blockquote>
      O usuário recebedor, por meio do software de automação utilizado por ele, acessa a API Pix para a criação de uma solicitação de confirmação de recorrência, informando o identificador da recorrência criada previamente, a data de expiração da solicitação, a identificação do usuário pagador e os dados completos da conta transacional para a qual a solicitação de confirmação de recorrência será enviada.

      Serviço invocado:
      * POST /solicRec → o usuário recebedor envia uma solicitação de confirmação de recorrência informando o identificador da recorrência entre outros dados.

      <dl>O PSP Recebedor envia ao PSP Pagador a solicitação correspondente, via mensageria.</dl>

      <dl>O PSP Pagador valida os dados do cliente e, caso estejam corretos, armazena a solicitação na lista de solicitações pendentes do usuário pagador e o notifica.</dl>

      <dl>O PSP Pagador apresenta ao usuário pagador, juntamente com alguns parâmetros adicionais de configuração, a solicitação de autorização de pagamentos recorrentes referentes àquela recorrência.</dl>
      <dl>O usuário pagador define as configurações desejadas e autoriza o pagamento das cobranças do contrato em questão via Pix Automático.</dl>

      <dl>O PSP Pagador armazena os dados da autorização e avisa o PSP Recebedor que a recorrência foi confirmada.</dl>

      Serviço invocado:
      * GET /solicRec/{idSolicRec} → a qualquer momento deste fluxo após o passo 1, o usuário recebedor pode consultar junto ao PSP Recebedor (fornecedor da API) a situação da solicitação.
      </blockquote>
      <hr>

      **Caso de Uso: Cancelamento de recorrência**

      **Aplicação:** usuários recebedores que desejam cancelar uma recorrência porque o contrato com o usuário pagador foi rescindido ou porque o usuário pagador gostaria de usar outra forma de pagamento.

      **Premissas:** deve existir uma recorrência ativa vigente.

      <blockquote>
      O usuário recebedor, por meio do software de automação utilizado por ele, acessa a API Pix para solicitar o cancelamento de uma recorrência, informando o identificador da recorrência e o status Cancelada.

      Serviço invocado:
      * PATCH /rec/{idRec} → informando o status para ‘CANCELADA’.

      <dl>O PSP Recebedor cancela a recorrência.</dl>

      <dl>O PSP Recebedor envia informação sobre o cancelamento da recorrência ao PSP Pagador.</dl>

      <dl>O PSP Pagador cancela a autorização vinculada à recorrência cancelada.</dl>
      </blockquote>
    </details>

    ________________

    ## **Resumo Técnico da API**

    Se tiver dúvidas, consulte também a documentação técnica oficial da API de Pix Automático disponibilizada pelo BACEN neste link: __[Documentação Técnica da API de Pix Automático](https://bacen.github.io/pix-api/#/)__.

    Fluxo de jornadas desta API:

    | Jornadas                                                                      |
    |:------------------------------------------------------------------------------:|
    | [**Jornada 1**](pix-automatico#tag/jornada1/post/rec) |
    ||
    | [**Jornada 2**](pix-automatico#tag/jornada2/post/locrec) |
    ||
    | [**Jornada 3**](pix-automatico#tag/jornada3/post/locrec) |
    ||
    | [**Jornada 4**](pix-automatico#tag/jornada4/post/locrec) |

