# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will download a prebuilt Ruby version, install dependencies and run tests with Rake
# For more information see: https://github.com/marketplace/actions/setup-ruby-jruby-and-truffleruby

name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  test:
    name: Ruby ${{ matrix.ruby }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # don't fail all matrix builds if one fails
      matrix:
        ruby:
          - '2.7'
          - '3.0'
          - '3.1'
          - '3.2'
          - '3.3'
          - '3.4'
    env:
      BUNDLE_WITHOUT: development
    steps:
    - uses: actions/checkout@v4

    - name: Install ghostscript
      run: |
        sudo apt-get update
        sudo apt-get -y install ghostscript
        which ghostscript

    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby }}
        bundler-cache: false # Desabilitado para permitir atualização do lockfile

    - name: Install dependencies
      run: |
        bundle config set --local path vendor/bundle
        bundle install --jobs 4

    - name: Run tests
      run: bundle exec rake

  test-head:
    name: Ruby head (experimental)
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      BUNDLE_WITHOUT: development
    steps:
    - uses: actions/checkout@v4

    - name: Install ghostscript
      run: |
        sudo apt-get update
        sudo apt-get -y install ghostscript

    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: head
        bundler-cache: false

    - name: Install dependencies
      run: bundle install --jobs 4 || echo "Bundle install failed - Ruby head may have incompatible dependencies"
      continue-on-error: true

    - name: Run tests
      run: bundle exec rake || echo "Tests skipped due to dependency issues"
      continue-on-error: true
