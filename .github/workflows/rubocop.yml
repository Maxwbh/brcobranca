# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: 'Rubocop'

on:
  push:
    branches: ['master']
  pull_request:
    branches: ['master']

permissions:
  contents: read
  security-events: write

jobs:
  rubocop:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'
          bundler-cache: true

      # Roda o RuboCop uma única vez: emite o relatório no console, grava o
      # SARIF para o code-scanning e falha o job em offenses de nível E.
      # Substitui o antigo job "linters", que duplicava esta mesma execução.
      - name: RuboCop (lint + SARIF)
        run: |
          bundle exec rubocop --parallel --color \
            --require code_scanning \
            --format progress \
            --format CodeScanning::SarifFormatter --out rubocop.sarif \
            --fail-level E

      - name: Upload SARIF output
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: rubocop.sarif
